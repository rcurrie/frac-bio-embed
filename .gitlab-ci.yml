image: ghcr.io/osscontainertools/kaniko:debug

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - build-and-push

build-and-push-job:
  stage: build-and-push
  variables:
    GODEBUG: "http2client=0"
    # Increase memory for the build pod
    KUBERNETES_MEMORY_REQUEST: "16Gi"
    KUBERNETES_MEMORY_LIMIT: "32Gi"
    KUBERNETES_HELPER_MEMORY_LIMIT: "8Gi" # Boost the helper!
  script:
    # - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    # - /kaniko/executor --cache=true --push-retry=10 --snapshot-mode=redo --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA --destination $CI_REGISTRY_IMAGE:latest --cleanup --compressed-caching=false
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
      - /kaniko/executor \
      --cache=true \
      --push-retry=10 \
      --snapshot-mode=time \
      --use-new-run \
      --context $CI_PROJECT_DIR \
      --dockerfile $CI_PROJECT_DIR/Dockerfile \
      --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
      --destination $CI_REGISTRY_IMAGE:latest \
      --cleanup \
      --compressed-caching=false
